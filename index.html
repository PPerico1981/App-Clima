<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>App Clima</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body>
        <header>
            <div>
                <nav
                    class="navbar navbar-expand-lg bg-dark navbar-dark sticky-top"
                >
                    <div class="container-fluid">
                        <button
                            class="navbar-toggler"
                            type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#navbarNavAltMarkup"
                            aria-controls="navbarNavAltMarkup"
                            aria-expanded="false"
                            aria-label="Toggle navigation"
                        >
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div
                            class="collapse navbar-collapse"
                            id="navbarNavAltMarkup"
                        >
                            <div class="navbar-nav ms-left">
                                <a
                                    id="link-home"
                                    class="nav-link active"
                                    aria-current="page"
                                    href="#"
                                    >Home</a
                                >
                            </div>
                        </div>
                    </div>
                </nav>
            </div>
            <div class="bg-primary text-white text-center p-4">
                <h1>🌦️ App del Clima</h1>
                <p>Consulta el clima de tu ciudad</p>
            </div>
        </header>

        <main class="container my-4">
            <section class="row g-3" id="cities"></section>
        </main>

        <footer class="bg-dark text-white text-center p-3">
            <p>© 2026 App Clima - PABLO PERICÓ B.</p>
        </footer>

        <script src="js/app.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
